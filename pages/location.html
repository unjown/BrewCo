<!DOCTYPE html>
<html lang="en">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Location | Brew &amp; Co.</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.3/js/bootstrap.bundle.min.js"></script>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="../css/style.css">
<script src = "../js/index.js"></script>
</head>
<body>

<header class="navbar-brew sticky-top">
  <nav class="navbar navbar-expand-lg container py-3">
    <a class="navbar-brand font-display fw-semibold" href="../index.html" style="color:var(--off-white);">Brew <em style="font-style:italic; font-weight:300; color:var(--muted);">&amp;</em> Co.</a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu" aria-controls="navMenu" aria-expanded="false" aria-label="Toggle navigation">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse justify-content-end" id="navMenu">
      <ul class="navbar-nav gap-lg-4 me-lg-4">
        <li class="nav-item"><a class="nav-link" href="menu.html">Menu</a></li>
        <li class="nav-item"><a class="nav-link" href="location.html">Locations</a></li>
        <li class="nav-item"><a class="nav-link" href="about.html">About</a></li>
        <li class="nav-item"><a class="nav-link" href="contact.html">Contact</a></li>
        <li class="nav-item"><a class="nav-link" href="order.html">Order</a></li>
      </ul>
      <div class="btn btn-outline-cream mt-3 mt-lg-0" id="openStatus">We're Open</div> <!--create creative hover animation-->
    </div>
  </nav>
</header>
<section class="locations-hero">
      <div class="container">
        <p class="eyebrow">Find a Brew &amp; Co. near you</p>
        <h1 class="font-display hero-heading mb-3">Coffee, close by.</h1>
        <p class="hero-copy">
          Search branches, check opening status, and get directions to your nearest Brew&nbsp;&amp;&nbsp;Co.
        </p>
      </div>
    </section>
<main class = "locations-main">
      <div class="container py-5">
        <div class="row g-4 align-items-start">
          <div class="col-lg-7">
            <div class="panel-card mb-1">
              <div class="d-flex flex-column gap-3 align-items-md-center">
                <div class="search-wrap flex-grow-1 w-100">
                     <input id="searchInput" type="text" class="form-control" placeholder="Search city, branch, or address">
                </div>

                <div class="status-filters d-flex flex-row gap-2">
                    <!---
                  <button class="btn filter-btn active" data-filter="all">All</button>
                  <button class="btn filter-btn" data-filter="open">Open Now</button>
                  <button class="btn filter-btn" data-filter="opening-soon">Opening Soon</button>
                  <button class="btn filter-btn" data-filter="closing-soon">Closing Soon</button>-->
                </div>
              </div>
            </div>

            <div class="branch-list" id="branchList">
                         </div>

            <div id="emptyState" class="empty-state d-none">
              <i class="bi bi-search-heart"></i>
              <h3>No branches found</h3>
              <p>Try another city or search term.</p>
            </div>
          </div>

          <div class="col-lg-5">
            <div class="map-card">
              <div class="map-header d-flex justify-content-between align-items-center mb-3">
                <div>
                  <p class="eyebrow mb-1">Map</p>
                  <h2 class="font-display map-title mb-0">Your nearest cup</h2>
                </div>
              </div>

              <div class="map-frame">
                <iframe
                  title="Brew & Co. map"
                  src="https://www.google.com/maps?q=Quezon%20City%20Philippines&output=embed"
                  loading="lazy"
                  referrerpolicy="no-referrer-when-downgrade"
                  id="mapIframe">
                </iframe>
              </div>
            </div>
          </div>
        </div>
      </div>


    </main>
</body></html>
